<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Security Home</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background:#f5f5f5;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
        }

        .card{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,.15);
            width:450px;
            text-align:center;
        }

        h1{
            color:#2c3e50;
        }

        #token{
            margin-top:20px;
            word-break:break-all;
            background:#eee;
            padding:10px;
            border-radius:5px;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            border:none;
            background:#1976d2;
            color:white;
            border-radius:5px;
            cursor:pointer;
        }

        button:hover{
            background:#125aa2;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎉 Login Successful</h1>

    <p>Welcome to Spring Security OAuth2 Demo</p>

    <h3>Access Token</h3>

    <div id="token">Loading...</div>

    <button onclick="copyToken()">Copy Token</button>
</div>

<script>

    // Read token from URL
    const params = new URLSearchParams(window.location.search);
    const token = params.get("token");

    if(token){
        document.getElementById("token").innerText = token;

        // Store token in browser
        localStorage.setItem("accessToken", token);
    }else{
        document.getElementById("token").innerText = "No token found.";
    }

    function copyToken(){
        navigator.clipboard.writeText(document.getElementById("token").innerText);
        alert("Token copied!");
    }

</script>

</body>
</html>
